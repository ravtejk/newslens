# =============================================================================
# NewsLens sources & interests — this file is yours to edit.
#
# SEEDED 2026-07-03 from the principal's outlet list (M2 dispatch). Every
# rss_url below was live-verified on 2026-07-03 with the pipeline's own
# User-Agent; outlets with no usable feed are recorded as comments with the
# reason, at the bottom of the sources block. Run `scripts/doctor` after any
# edit — it validates format and re-checks that enabled feeds resolve.
#
# Fields per source:
#   name: <outlet>            required — used in attribution + corroboration
#   rss_url: <feed URL>       required unless tier: reference_only
#   tier: full | headline_only | cautious | reference_only   (default: full)
#     full           usable RSS content (title + summary)
#     headline_only  paywalled: titles/summaries only; attribution + linkout
#     cautious       aggregator: DEFAULT-DISABLED; if enabled, flagged and
#                    down-weighted downstream
#     reference_only citable in briefings, NEVER fetched
#   enabled: true|false       default true (cautious tier defaults to false)
#   wire_syndication: true    wire services AND heavy wire-republishers, so
#                             corroboration counting can exclude them — five
#                             outlets running the same wire copy is ONE source
#   note: "..."               free-text context, surfaced in reports
# =============================================================================

# --- Settings ------------------------------------------------------------------
# threads_steer_selection (A6, principal editorial review 2026-07-05):
# false = briefings-of-record select on interest tags + world impact only;
# your live threads are still matched, recorded, and woven into continuity —
# they just don't boost what gets picked. Flip to true to restore steering.
settings:
  threads_steer_selection: false

sources:
  # --- Wire / major (reference_only per principal: referenced, not fetched) --
  - name: Associated Press
    tier: reference_only
    wire_syndication: true
    note: "public RSS discontinued by AP; wire copy reaches us via other feeds"
  - name: Reuters
    tier: reference_only
    wire_syndication: true
    note: "public RSS discontinued 2020; wire copy reaches us via other feeds"
  - name: The New York Times
    tier: reference_only
    note: "principal: reference/linkout only — NYT RSS exists and was verified live (rss.nytimes.com) if this ever changes"
  - name: Wikipedia
    tier: reference_only
    note: "principal: requires primary-source verification; NEVER counts as corroboration"

  # --- Paywalled majors (headline_only: titles + summaries, linkout) --------
  - name: Bloomberg Markets
    rss_url: https://feeds.bloomberg.com/markets/news.rss
    tier: headline_only
    wire_syndication: true
    note: "Bloomberg syndicates widely (incl. BNN Bloomberg) — wire-flagged"
  - name: Bloomberg Politics
    rss_url: https://feeds.bloomberg.com/politics/news.rss
    tier: headline_only
    wire_syndication: true
  - name: Washington Post — World
    rss_url: https://feeds.washingtonpost.com/rss/world
    tier: headline_only
    note: "slow feed (8-10s observed) — ingestion timeout has headroom"
  - name: Washington Post — Business
    rss_url: https://feeds.washingtonpost.com/rss/business
    tier: headline_only

  # --- Broadcast / digital ---------------------------------------------------
